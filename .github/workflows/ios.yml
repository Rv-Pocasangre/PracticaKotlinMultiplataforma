name: Build iOS KMP

# Se ejecuta automáticamente cuando haces push a main
on:
  push:
    branches: [ main ]
  # También puedes ejecutarlo manualmente desde GitHub
  workflow_dispatch:

jobs:
  build-ios:
    # GitHub nos da una Mac virtual con macOS
    runs-on: macos-latest

    steps:
      # Paso 1: Descarga tu código del repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # Paso 2: Instala Java 17 (necesario para Gradle/Kotlin)
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Paso 3: Guarda en caché las dependencias de Gradle
      # (hace que las siguientes ejecuciones sean más rápidas)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # Paso 4: Da permisos de ejecución al script de Gradle
      - name: Permisos gradlew
        run: chmod +x gradlew

      # Paso 5: Compila el framework de Kotlin para iOS
      - name: Compilar framework Kotlin para iOS
        run: ./gradlew :composeApp:assembleXCFramework

      # Paso 6: Compila la app iOS con Xcode (sin firma)
      - name: Compilar app iOS con Xcode
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      # Paso 7: Si todo salió bien, guarda el resultado como artefacto
      - name: Guardar artefactos de build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            composeApp/build/XCFrameworks/
          retention-days: 7