name: Build iOS KMP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}

      - name: Permisos gradlew
        run: chmod +x gradlew

      # Listar tareas (puedes eliminar este paso después)
      - name: Listar tareas iOS
        run: ./gradlew :composeApp:tasks --all | grep -i "ios\|xcframework\|framework\|apple\|embed"

      # Compila el framework para simulador iOS (arm64)
      - name: Compilar framework para simulador
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64

      # Compila la app con Xcode usando el framework generado
      - name: Compilar app iOS con Xcode
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build